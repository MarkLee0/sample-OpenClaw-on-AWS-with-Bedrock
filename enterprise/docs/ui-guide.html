<title>OpenClaw Enterprise — Documentation</title>

<style>
:root {
  --bg: #08090d;
  --surface: #111318;
  --surface2: #181b23;
  --card: #1c1f2a;
  --border: #252838;
  --border-l: #333750;
  --primary: #7c6cff;
  --primary-dim: rgba(124,108,255,.08);
  --primary-glow: rgba(124,108,255,.15);
  --pl: #a599ff;
  --success: #34d399;
  --success-dim: rgba(52,211,153,.08);
  --warn: #fbbf24;
  --warn-dim: rgba(251,191,36,.06);
  --danger: #f87171;
  --cyan: #22d3ee;
  --cyan-dim: rgba(34,211,238,.08);
  --text: #e8eaf0;
  --text-s: #a0a6b8;
  --text-m: #6b7280;
  --rail-w: 76px;
  --top-h: 52px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',system-ui,sans-serif; background:var(--bg); color:var(--text); line-height:1.65; overflow:hidden; height:100vh; }

/* ═══ TOP BAR ═══ */
.topbar {
  position:fixed; top:0; left:0; right:0; height:var(--top-h); z-index:100;
  background:rgba(8,9,13,.85); backdrop-filter:blur(20px); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 20px; gap:16px;
}
.topbar .logo { display:flex; align-items:center; gap:10px; width:var(--rail-w); justify-content:center; }
.topbar .logo svg { width:28px; height:28px; }
.topbar .logo-text { font-weight:700; font-size:14px; letter-spacing:-.3px; color:var(--pl); }
.topbar .spacer { flex:1; }
.lang-toggle { display:flex; gap:2px; background:var(--surface2); border-radius:8px; padding:2px; }
.lang-btn { padding:4px 14px; border-radius:6px; border:none; background:none; color:var(--text-m); font-size:12px; font-family:inherit; cursor:pointer; transition:.2s; }
.lang-btn.active { background:var(--primary); color:#fff; }

/* ═══ NAVIGATION RAIL (M3 style) ═══ */
.rail {
  position:fixed; left:0; top:var(--top-h); bottom:0; width:var(--rail-w); z-index:90;
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; padding:8px 0; overflow-y:auto;
  scrollbar-width:none;
}
.rail::-webkit-scrollbar { display:none; }
.rail-group { padding:4px 0; }
.rail-group + .rail-group { border-top:1px solid var(--border); margin-top:4px; }
.rail-label { font-size:8px; text-transform:uppercase; letter-spacing:.8px; color:var(--text-m); text-align:center; padding:6px 4px 2px; font-weight:600; }
.rail-item {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:8px 4px 6px; margin:1px 6px; border-radius:12px; cursor:pointer;
  transition:all .2s; position:relative; text-decoration:none; color:var(--text-m);
}
.rail-item:hover { background:var(--primary-dim); color:var(--text-s); }
.rail-item.active { background:var(--primary-glow); color:var(--pl); }
.rail-item.active::before {
  content:''; position:absolute; left:-6px; top:50%; transform:translateY(-50%);
  width:3px; height:20px; background:var(--primary); border-radius:0 3px 3px 0;
}
.rail-icon { width:20px; height:20px; display:flex; align-items:center; justify-content:center; }
.rail-icon svg { width:18px; height:18px; }
.rail-text { font-size:8.5px; font-weight:500; text-align:center; line-height:1.2; max-width:64px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* ═══ MAIN CONTENT ═══ */
.main {
  position:fixed; left:var(--rail-w); top:var(--top-h); right:0; bottom:0;
  overflow-y:auto; padding:32px 40px 80px; scroll-behavior:smooth;
}
.main::-webkit-scrollbar { width:6px; }
.main::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.page { display:none; max-width:860px; animation:fadeIn .3s ease; }
.page.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

/* ═══ CONTENT ELEMENTS ═══ */
.page-title { font-size:28px; font-weight:700; letter-spacing:-.5px; margin-bottom:4px; }
.page-sub { font-size:14px; color:var(--text-s); margin-bottom:28px; }

.section { margin-bottom:28px; }
.section-head {
  font-size:15px; font-weight:600; padding-left:12px; margin-bottom:12px;
  border-left:3px solid var(--primary); color:var(--text);
}

/* Design Intent */
.intent {
  border:1px solid rgba(251,191,36,.12); background:var(--warn-dim);
  border-radius:12px; margin:16px 0; overflow:hidden;
}
.intent-head {
  display:flex; align-items:center; gap:8px; padding:12px 16px;
  cursor:pointer; font-size:13px; font-weight:600; color:var(--warn); user-select:none;
}
.intent-head::after { content:'▾'; margin-left:auto; font-size:10px; transition:.2s; }
.intent.closed .intent-head::after { transform:rotate(-90deg); }
.intent-body { padding:0 16px 14px; font-size:13px; color:var(--text-s); line-height:1.75; }
.intent.closed .intent-body { display:none; }

/* Cards */
.card {
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  overflow:hidden; margin:14px 0;
}
.card-head {
  background:var(--surface2); padding:10px 16px; border-bottom:1px solid var(--border);
  font-size:12px; font-weight:600; display:flex; align-items:center; gap:8px;
}
.card-body { padding:16px; }

/* Annotations */
.note {
  display:flex; align-items:flex-start; gap:10px; border-radius:10px;
  padding:12px 16px; margin:12px 0; font-size:12.5px; line-height:1.6;
}
.note.info { background:var(--primary-dim); border:1px solid rgba(124,108,255,.15); }
.note.ok { background:var(--success-dim); border:1px solid rgba(52,211,153,.15); }
.note.warn { background:var(--warn-dim); border:1px solid rgba(251,191,36,.15); }
.note.tip { background:var(--cyan-dim); border:1px solid rgba(34,211,238,.15); }
.note-icon { font-size:16px; flex-shrink:0; margin-top:1px; }
.note-text { flex:1; }
.note-text strong { color:var(--text); }

/* Code */
.code {
  background:var(--bg); border:1px solid var(--border); border-radius:8px;
  padding:12px 14px; font-family:'JetBrains Mono',monospace; font-size:11.5px;
  color:var(--text-s); white-space:pre-wrap; margin:8px 0; overflow-x:auto; line-height:1.7;
}

/* Flow chain */
.flow { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin:10px 0; }
.flow-node {
  padding:6px 12px; border-radius:8px; font-size:11px; font-weight:600;
  border:1px solid var(--border); background:var(--surface2); text-align:center;
}
.flow-node.p { background:var(--primary-dim); border-color:rgba(124,108,255,.3); color:var(--pl); }
.flow-node.s { background:var(--success-dim); border-color:rgba(52,211,153,.3); color:var(--success); }
.flow-node.c { background:var(--cyan-dim); border-color:rgba(34,211,238,.3); color:var(--cyan); }
.flow-node.d { background:rgba(248,113,113,.06); border-color:rgba(248,113,113,.2); color:var(--danger); }
.flow-arrow { color:var(--text-m); font-size:12px; }

/* Steps */
.steps { margin:12px 0; }
.step-item {
  display:flex; gap:10px; margin-bottom:8px; font-size:12.5px;
}
.step-num {
  width:22px; height:22px; border-radius:50%; background:var(--primary);
  color:#fff; display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; flex-shrink:0; margin-top:1px;
}
.step-text { color:var(--text-s); flex:1; }

/* Tables */
.tbl { width:100%; border-collapse:collapse; font-size:12px; margin:8px 0; }
.tbl th { text-align:left; padding:8px 10px; color:var(--text-m); font-size:10px; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); font-weight:600; }
.tbl td { padding:8px 10px; border-bottom:1px solid rgba(37,40,56,.6); }
.tbl tr:nth-child(even) td { background:rgba(255,255,255,.01); }

/* Badges */
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:600; }
.badge.green { background:rgba(52,211,153,.12); color:var(--success); }
.badge.yellow { background:rgba(251,191,36,.12); color:var(--warn); }
.badge.blue { background:rgba(124,108,255,.12); color:var(--pl); }
.badge.cyan { background:rgba(34,211,238,.12); color:var(--cyan); }

/* Stats grid */
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:12px 0; }
.stat { text-align:center; padding:12px; background:var(--surface2); border-radius:10px; border:1px solid var(--border); }
.stat-v { font-size:22px; font-weight:700; }
.stat-l { font-size:9px; color:var(--text-m); margin-top:2px; }

/* Separator */
.sep { border-top:1px solid var(--border); margin:20px 0; }

/* Grid helpers */
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

/* Technical Deep Dive */
.deep {
  border:1px solid rgba(124,108,255,.15); background:rgba(124,108,255,.03);
  border-radius:12px; margin:20px 0; overflow:hidden;
}
.deep-head {
  display:flex; align-items:center; gap:8px; padding:12px 16px;
  cursor:pointer; font-size:13px; font-weight:600; color:var(--pl); user-select:none;
  background:rgba(124,108,255,.05);
}
.deep-head::after { content:'▸ expand'; margin-left:auto; font-size:10px; font-weight:400; color:var(--text-m); transition:.2s; }
.deep.open .deep-head::after { content:'▾ collapse'; }
.deep-body { display:none; padding:16px; font-size:12.5px; color:var(--text-s); line-height:1.7; }
.deep.open .deep-body { display:block; }
.deep-body h4 { color:var(--pl); font-size:13px; margin:14px 0 6px; font-weight:600; }
.deep-body h4:first-child { margin-top:0; }
.deep-body .code { font-size:10.5px; }
.deep-body .tbl { font-size:11px; }
</style>
</head>

      + '<h4>Environment Variable Flow</h4><div class="code">.env → deploy.sh → SSM SecureString (ADMIN_PASSWORD, JWT_SECRET, GATEWAY_TOKEN)\n                → /etc/openclaw/env (loaded by systemd services)\n                → AgentCore Runtime env vars (STACK_NAME, AWS_REGION, DYNAMODB_TABLE, S3_BUCKET, BEDROCK_MODEL_ID)\n                → container os.environ (server.py, workspace_assembler.py read these)</div>'
      + '<h4>Port Map (all on one EC2)</h4><div class="code">18789  — OpenClaw Gateway (IM webhook receiver)\n 8091  — H2 Proxy (HTTP/2 Bedrock intercept)\n 8090  — Tenant Router (message→agent routing)\n 8099  — Admin Console API + Frontend (FastAPI + React SPA)</div>'
      + '<h4>Key Design Trade-offs</h4><ul style="font-size:12px;color:var(--text-s);line-height:1.8"><li><strong>Gateway unaware of multi-tenancy:</strong> Advantage: can upgrade OpenClaw independently. Risk: Gateway message format changes break <code>extractUserMessage()</code> in H2 Proxy. Pinned at v2026.3.24 for stability.</li><li><strong>Single EC2 for all services:</strong> Simplicity over HA. Production should consider ALB + multi-AZ for the admin console, though the IM path is resilient (Gateway has built-in message retry).</li><li><strong>5-minute config propagation:</strong> Global/Position SOUL changes are polled every 5 min by running agents (<code>_CONFIG_VERSION_CHECK_INTERVAL = 300</code> in server.py). Serverless agents always get fresh config (new microVM). Always-on containers have longer cache.</li><li><strong>H2 Proxy binding cache (60s):</strong> After successful pairing, the "not bound" cache entry could reject the first real message. Fixed by explicitly deleting cache on pair-complete.</li></ul>',
      '<h4>DynamoDB 单表设计</h4><p>所有数据存储在一张 DynamoDB 表中（表名 = STACK_NAME）。PK 始终为 "ORG#acme"，SK 编码实体类型和 ID：</p><div class="code">EMP#{emp_id}             — 员工记录（姓名、岗位 ID、Agent ID、通道、部门、角色、密码哈希）\nPOS#{pos_id}             — 岗位（名称、部门 ID、工具白名单、默认技能、部署模式、Fargate 层级）\nAGENT#{agent_id}         — Agent（状态、技能、通道、质量分、SOUL 版本）\nBIND#{bind_id}           — 员工↔Agent 1:1 绑定\nMAPPING#{ch}__{uid}      — IM 用户 → 员工映射\nCONFIG#model             — 模型层级（默认、回退、岗位覆盖、员工覆盖）\nCONFIG#routing           — 运行时路由（position_runtime、employee_override）\nCONFIG#kb-assignments    — KB 分配（岗位级、员工级）\nCONFIG#agent-config      — Agent 配置（语言、轮次、压缩模式）\nCONFIG#global-version    — 缓存失效版本号（SOUL/KB 变更时递增）\nKB#{kb_id}               — 知识库元数据\nSESSION#{tenant_id}      — 活跃会话\nCONV#{tenant_id}#{seq}   — 对话轮次\nUSAGE#{emp}/{type}#{date} — 每日用量（按 serverless/always-on 分离）\nAUDIT#{audit_id}         — 审计事件\nPAIR#{token}             — IM 配对令牌\nROLE#{role_id}           — 角色定义</div><p>GSI1（GSI1PK/GSI1SK）提供按类型的访问模式：TYPE#session、TYPE#usage、TYPE#audit。</p>'
      + '<h4>环境变量流</h4><div class="code">.env → deploy.sh → SSM SecureString（ADMIN_PASSWORD、JWT_SECRET、GATEWAY_TOKEN）\n                → /etc/openclaw/env（systemd 服务加载）\n                → AgentCore Runtime 环境变量\n                → 容器 os.environ（server.py、workspace_assembler.py 读取）</div>'
      + '<h4>端口映射（全在一台 EC2 上）</h4><div class="code">18789  — OpenClaw Gateway（IM webhook 接收）\n 8091  — H2 Proxy（HTTP/2 Bedrock 拦截）\n 8090  — Tenant Router（消息→Agent 路由）\n 8099  — Admin Console API + 前端（FastAPI + React SPA）</div>'
      + '<h4>关键设计取舍</h4><ul style="font-size:12px;color:var(--text-s);line-height:1.8"><li><strong>Gateway 无多租户感知：</strong>优势是可以独立升级 OpenClaw。风险是 Gateway 消息格式变化会破坏 H2 Proxy 的 <code>extractUserMessage()</code>。锁定 v2026.3.24 以保持稳定性。</li><li><strong>所有服务在单 EC2 上：</strong>简单性优先于高可用。生产环境应考虑 ALB + 多 AZ 部署管理控制台，但 IM 路径有弹性（Gateway 内置消息重试）。</li><li><strong>5 分钟配置传播：</strong>全局/岗位 SOUL 变更每 5 分钟由运行中的 Agent 轮询（server.py 中 <code>_CONFIG_VERSION_CHECK_INTERVAL = 300</code>）。Serverless Agent 始终获取最新配置（新微虚拟机）。Always-on 容器缓存更久。</li><li><strong>H2 Proxy 绑定缓存（60 秒）：</strong>成功配对后，"未绑定"的缓存条目可能拒绝第一条真实消息。通过在 pair-complete 时显式删除缓存解决。</li></ul>'
    );
  }
},

deploy: {
  en: { title:'Deploy with deploy.sh', sub:'One-command deployment: 9 automated steps including Fargate tier setup, ~20 minutes, idempotent.' },
  zh: { title:'使用 deploy.sh 部署', sub:'一键部署：9 个自动化步骤（含 Fargate 层级设置），约 20 分钟，幂等可重复执行。' },
  body() {
    return intent(
      t(
        '<strong>Why one-command deployment?</strong> Enterprise customers need <strong>repeatability</strong>: the same script must produce identical results whether run by a senior architect or a first-day ops engineer. <code>deploy.sh</code> (797 lines) encapsulates 9 complex AWS operations into one <strong>idempotent</strong> script. Re-running is always safe: it detects existing resources and updates only what changed. <strong>Security value:</strong> secrets (admin password, JWT key) are generated at deploy time and stored in SSM SecureString — never written to disk or committed to git. The script validates prerequisites before creating any resources (AWS CLI ≥ 2.27 for AgentCore API, Bedrock model access check), preventing half-deployed stacks. <strong>No local Docker required</strong> — the Docker build runs on the EC2 itself (Graviton ARM64, same arch as production).',
        '<strong>为什么一键部署？</strong>企业客户需要<strong>可重复性</strong>：同一脚本无论谁执行都必须产生相同结果。<code>deploy.sh</code>（797 行）将 9 个复杂 AWS 操作封装为一个<strong>幂等</strong>脚本。重复运行始终安全：检测已有资源，只更新变化部分。<strong>安全价值：</strong>密钥（admin 密码、JWT 密钥）在部署时生成并存储在 SSM SecureString——永不写入磁盘或提交到 git。脚本在创建任何资源之前验证前置条件（AWS CLI ≥ 2.27 以支持 AgentCore API、Bedrock 模型访问检查），防止半部署的 stack。<strong>无需本地 Docker</strong>——Docker 构建在 EC2 上执行（Graviton ARM64，与生产环境相同架构）。'
      )
    )
    + sectionHead(t('Prerequisites','前置条件'))
    + '<table class="tbl"><tr><th>'+t('Requirement','要求')+'</th><th>'+t('Check','检查')+'</th><th>'+t('Min Version','最低版本')+'</th></tr>'
    + '<tr><td>AWS CLI</td><td><code>aws --version</code></td><td>>= 2.27 (bedrock-agentcore-control)</td></tr>'
    + '<tr><td>Python</td><td><code>python3 --version</code></td><td>>= 3.10</td></tr>'
    + '<tr><td>SSM Plugin</td><td><code>session-manager-plugin</code></td><td>'+t('Latest','最新')+'</td></tr>'
    + '<tr><td>'+t('AWS Credentials','AWS 凭证')+'</td><td><code>aws sts get-caller-identity</code></td><td>'+t('Must succeed','必须成功')+'</td></tr></table>'
    + sectionHead(t('Quick Start','快速开始'))
    + '<div class="code">cd enterprise\ncp .env.example .env\n# '+t('Edit: STACK_NAME, REGION, ADMIN_PASSWORD','编辑：STACK_NAME, REGION, ADMIN_PASSWORD')+'\nbash deploy.sh</div>'
    + sectionHead(t('.env Configuration','.env 配置'))
    + '<table class="tbl"><tr><th>'+t('Variable','变量')+'</th><th>'+t('Required','必填')+'</th><th>'+t('Default','默认')+'</th><th>'+t('Notes','说明')+'</th></tr>'
    + '<tr><td><code>STACK_NAME</code></td><td>✅</td><td>openclaw</td><td>'+t('Names ALL resources (CFN stack, DynamoDB table, SSM paths, ECR repo). Unique per account/region.','命名所有资源（CFN stack、DynamoDB 表、SSM 路径、ECR 仓库）。每账号/区域唯一。')+'</td></tr>'
    + '<tr><td><code>REGION</code></td><td>✅</td><td>us-east-1</td><td>'+t('Must have Bedrock + AgentCore. Recommended: us-east-1 or us-west-2.','必须有 Bedrock + AgentCore。推荐：us-east-1 或 us-west-2。')+'</td></tr>'
    + '<tr><td><code>ADMIN_PASSWORD</code></td><td>✅</td><td>—</td><td>'+t('Initial login password for all employees. First login forces personal password change.','所有员工的初始登录密码。首次登录强制修改为个人密码。')+'</td></tr>'
    + '<tr><td><code>MODEL</code></td><td></td><td>claude-sonnet-4-5</td><td>'+t('Default Bedrock model. Position overrides in Settings.','默认 Bedrock 模型。岗位级覆盖在 Settings 中配置。')+'</td></tr>'
    + '<tr><td><code>INSTANCE_TYPE</code></td><td></td><td>c7g.large</td><td>Graviton ARM ($0.068/hr)</td></tr>'
    + '<tr><td><code>EXISTING_VPC_ID</code></td><td></td><td>'+t('(new VPC)','（新建 VPC）')+'</td><td>'+t('Set to reuse an existing VPC','设置此项以复用已有 VPC')+'</td></tr>'
    + '<tr><td><code>WORKSPACE_BUCKET_NAME</code></td><td></td><td>'+t('auto','自动')+'</td><td>'+t('Set if multi-stack same account','同账号多 stack 时设置')+'</td></tr></table>'
    + sectionHead(t('9 Automated Steps','9 个自动化步骤'))
    + card(t('deploy.sh Execution Flow','deploy.sh 执行流程'),
      [['1',t('Prerequisites','前置检查'),t('AWS CLI ≥ 2.27 + Bedrock model access validation','AWS CLI ≥ 2.27 + Bedrock 模型访问验证'),'2s'],['2','CloudFormation',t('VPC/EC2/ECR/S3/IAM/ECS Cluster/EFS/CloudWatch — supports create or update','VPC/EC2/ECR/S3/IAM/ECS 集群/EFS/CloudWatch——支持创建或更新'),'8 min'],['3','Docker Build',t('Source → S3 → EC2 builds ARM image via SSM → ECR push (no local Docker)','源码 → S3 → EC2 通过 SSM 构建 ARM 镜像 → ECR 推送（无需本地 Docker）'),'10 min'],['4','AgentCore Runtime',t('Create default runtime + update ALL existing runtimes to new image','创建默认运行时 + 更新所有现有运行时到新镜像'),'30s'],['4.5',t('Fargate Tiers','Fargate 层级'),t('Register 4 tier task definitions + create ECS services (desiredCount=0)','注册 4 个层级任务定义 + 创建 ECS 服务（desiredCount=0）'),'30s'],['5','S3 Templates',t('Global SOUL + Position SOUL templates + Knowledge docs → S3','全局 SOUL + 岗位 SOUL 模板 + 知识文档 → S3'),'10s'],['6','DynamoDB Seed',t('Table creation + 20 employees, positions, departments, roles, settings, skills','表创建 + 20 员工、岗位、部门、角色、设置、技能'),'15s'],['7',t('Secrets + Env','密钥 + 环境'),t('SSM SecureString + /etc/openclaw/env via S3 relay','SSM SecureString + 通过 S3 中继写入 /etc/openclaw/env'),'10s'],['8','EC2 Services',t('npm build + venv + 3 systemd services + Gateway H2 Proxy injection + EFS mount','npm 构建 + venv + 3 个 systemd 服务 + Gateway H2 Proxy 注入 + EFS 挂载'),'3 min']].map(([n,name,desc,time])=>'<div style="display:flex;align-items:center;gap:10px;padding:5px 0;font-size:12px"><span style="background:var(--primary);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">'+n+'</span><span style="font-weight:600;min-width:120px">'+name+'</span><span style="color:var(--text-m);flex:1">'+desc+'</span><span class="badge green">'+time+'</span></div>').join('')
    )
    + note('info','💡',t(
      '<strong>Step 4 updates ALL runtimes:</strong> After Docker rebuild, deploy.sh iterates <code>list-agent-runtimes</code> and calls <code>update-agent-runtime</code> for each, preserving their individual IAM roles. This ensures all 4 tiers (Standard, Restricted, Engineering, Executive) point to the latest image without manual intervention.',
      '<strong>步骤 4 更新所有运行时：</strong>Docker 重建后，deploy.sh 遍历 <code>list-agent-runtimes</code>，为每个调用 <code>update-agent-runtime</code>，保留各自的 IAM 角色。确保 4 个层级（Standard、Restricted、Engineering、Executive）都指向最新镜像，无需手动干预。'
    ))
    + note('tip','⚡',t(
      '<strong>Step 4.5 (Fargate Tiers):</strong> Creates 4 ECS services (standard, restricted, engineering, executive) with <code>desiredCount=0</code>. Each tier gets its own task definition with tier-specific env vars: <code>BEDROCK_MODEL_ID</code>, <code>GUARDRAIL_ID</code>, <code>FARGATE_TIER</code>, <code>EFS_ENABLED=true</code>. Admin activates tiers per-position via Security Center — no redeploy needed.',
      '<strong>步骤 4.5（Fargate 层级）：</strong>创建 4 个 ECS 服务（standard、restricted、engineering、executive），<code>desiredCount=0</code>。每个层级有独立的任务定义和层级特定环境变量：<code>BEDROCK_MODEL_ID</code>、<code>GUARDRAIL_ID</code>、<code>FARGATE_TIER</code>、<code>EFS_ENABLED=true</code>。管理员通过 Security Center 按岗位激活层级——无需重新部署。'
    ))
    + sectionHead(t('Re-deploy Options','重新部署选项'))
    + '<div class="code">bash deploy.sh                   # '+t('Full deploy (idempotent)','完整部署（幂等）')+'\nbash deploy.sh --skip-build      # '+t('Skip Docker build (use existing ECR image)','跳过 Docker 构建（使用已有 ECR 镜像）')+'\nbash deploy.sh --skip-seed       # '+t('Skip DynamoDB seeding (preserve existing data)','跳过 DynamoDB 种子（保留已有数据）')+'\nbash deploy.sh --skip-services   # '+t('Skip EC2 service deployment','跳过 EC2 服务部署')+'</div>'
    + sectionHead(t('Post-Deployment Verification','部署后验证'))
    + '<div class="code"># '+t('Connect to EC2 via SSM','通过 SSM 连接 EC2')+'\naws ssm start-session --target &lt;INSTANCE_ID&gt; --region &lt;REGION&gt;\n\n# '+t('Check all 3 services + Gateway','检查 3 个服务 + Gateway')+'\nsystemctl is-active openclaw-admin tenant-router bedrock-proxy-h2\nsystemctl --user is-active openclaw-gateway  # '+t('runs as ubuntu user','以 ubuntu 用户运行')+'\n\n# '+t('Check all 4 ports','检查 4 个端口')+'\nss -tlnp | grep -E \'8090|8091|8099|18789\'\n\n# '+t('Verify employee data loaded','验证员工数据已加载')+'\ncurl -s http://localhost:8099/api/v1/org/employees | \\\n  python3 -c "import json,sys; d=json.load(sys.stdin); print(f\'Employees: {len(d)}\')"</div>'
    + deep(
      '<h4>deploy.sh Internal Architecture (797 lines)</h4>'
      + '<h4>Docker Build: EC2-Based, Not Local</h4>'
      + '<div class="code">Local machine:  tar czf agent-build.tar.gz enterprise/agent-container enterprise/exec-agent enterprise/auth-agent\n                → aws s3 cp to s3://{bucket}/_build/agent-build.tar.gz\n\nEC2 (via SSM):  aws s3 cp → tar xzf → docker build -f Dockerfile → docker push {ECR}:latest\n\nWhy: Graviton ARM64 architecture matches production. No cross-compilation. No local Docker needed.</div>'
      + '<h4>ec2-setup.sh: The Critical Final Step (228 lines)</h4>'
      + '<p>Runs ON the EC2 via SSM. 6 phases:</p>'
      + '<div class="code">Phase 1: apt-get install python3.12-venv, pip3 upgrade boto3\nPhase 2: npm install + npx vite build (React admin console) — runs as ubuntu user\nPhase 3: python3 -m venv /opt/admin-venv + pip install fastapi uvicorn boto3 anthropic\nPhase 4: Copy files: admin-console → /opt/, gateway files → /home/ubuntu/\nPhase 5: Install 3 systemd services (openclaw-admin, tenant-router, bedrock-proxy-h2)\n         + Inject AWS_ENDPOINT_URL_BEDROCK_RUNTIME=http://localhost:8091 into Gateway service\n         + Set openclaw.json baseUrl → http://localhost:8091\nPhase 6: Mount EFS at /mnt/efs for admin workspace browsing of Always-On agents</div>'
      + '<h4>CloudFormation Resources</h4><div class="code">Networking:   VPC + Public Subnet + IGW + Route Table (or reuse existing VPC)\nCompute:      EC2 c7g.large (Graviton ARM64, Ubuntu 24.04, SSM-managed)\nStorage:      S3 Bucket (versioned) + ECR Repository + EFS File System + Mount Target\nIAM:          EC2 Instance Role (SSM + S3 + DynamoDB + Bedrock + ECS + ECR)\n              AgentCore Execution Role (ECR pull + S3 + DynamoDB + Bedrock + CloudWatch)\nContainers:   ECS Cluster + Task Definition (Fargate, ARM64) + Security Group\nMonitoring:   CloudWatch Log Groups (/openclaw/{stack}/agent, /openclaw/{stack}/admin)</div>'
      + '<h4>Env Variable Relay: .env → S3 → EC2</h4>'
      + '<p>Step 7 writes env vars to a temp file, uploads to <code>s3://{bucket}/_deploy/env</code>, then SSM sends a command to pull it onto EC2 as <code>/etc/openclaw/env</code>. This avoids fragile JSON-in-JSON escaping when passing values with quotes or dollar signs through SSM <code>send-command</code>.</p>'
      + '<h4>Known Deployment Notes</h4><ul style="font-size:12px;color:var(--text-s);line-height:1.8"><li><strong>First deploy on new account:</strong> ECS service-linked role needs ~30s to propagate. First CFN create may fail. Re-run — second attempt succeeds.</li><li><strong>JWT_SECRET regenerates each run:</strong> Generated fresh with <code>openssl rand -hex 32</code>. Re-deploying invalidates existing tokens — employees re-login. Their personal passwords (bcrypt hashed in DynamoDB) persist.</li><li><strong>Docker image is shared across runtimes:</strong> All 4 tiers use the same ECR image. Tier differences come from env vars (BEDROCK_MODEL_ID, GUARDRAIL_ID, FARGATE_TIER) set in the task definition, not baked into the image.</li><li><strong>Existing VPC support:</strong> Set <code>EXISTING_VPC_ID</code> + <code>EXISTING_SUBNET_ID</code> in .env to deploy into an existing network. The subnet must be public (IGW route) and in a single AZ.</li></ul>',
      '<h4>deploy.sh 内部架构（797 行）</h4>'
      + '<h4>Docker 构建：在 EC2 上执行，非本地</h4>'
      + '<div class="code">本地机器:  tar czf agent-build.tar.gz enterprise/agent-container enterprise/exec-agent enterprise/auth-agent\n           → aws s3 cp 上传到 s3://{bucket}/_build/\n\nEC2（SSM）: aws s3 cp → tar xzf → docker build → docker push {ECR}:latest\n\n原因：Graviton ARM64 架构与生产环境一致。无交叉编译。无需本地 Docker。</div>'
      + '<h4>ec2-setup.sh：关键最终步骤（228 行）</h4>'
      + '<p>通过 SSM 在 EC2 上运行，6 个阶段：</p>'
      + '<div class="code">阶段 1: apt-get 安装 python3.12-venv，pip3 升级 boto3\n阶段 2: npm install + npx vite build（React 管理控制台）——以 ubuntu 用户运行\n阶段 3: 创建 Python venv /opt/admin-venv + pip install fastapi uvicorn boto3 anthropic\n阶段 4: 复制文件：admin-console → /opt/，gateway 文件 → /home/ubuntu/\n阶段 5: 安装 3 个 systemd 服务 + 注入 AWS_ENDPOINT_URL_BEDROCK_RUNTIME\n         + 设置 openclaw.json baseUrl → http://localhost:8091\n阶段 6: 挂载 EFS 到 /mnt/efs（管理员浏览 Always-On Agent 工作区）</div>'
      + '<h4>CloudFormation 资源</h4><div class="code">网络:     VPC + 公有子网 + IGW + 路由表（或复用已有 VPC）\n计算:     EC2 c7g.large（Graviton ARM64，Ubuntu 24.04，SSM 管理）\n存储:     S3 桶（版本化）+ ECR 仓库 + EFS 文件系统 + 挂载点\nIAM:      EC2 实例角色 + AgentCore 执行角色\n容器:     ECS 集群 + 任务定义（Fargate，ARM64）+ 安全组\n监控:     CloudWatch 日志组</div>'
      + '<h4>环境变量中继：.env → S3 → EC2</h4>'
      + '<p>步骤 7 将环境变量写入临时文件，上传到 <code>s3://{bucket}/_deploy/env</code>，然后 SSM 发送命令将其拉取到 EC2 的 <code>/etc/openclaw/env</code>。避免了通过 SSM <code>send-command</code> 传递含引号或美元符号的值时的 JSON 转义问题。</p>'
      + '<h4>部署注意事项</h4><ul style="font-size:12px;color:var(--text-s);line-height:1.8"><li><strong>新账号首次部署：</strong>ECS service-linked role 需约 30 秒传播。首次 CFN 创建可能失败，重跑即可。</li><li><strong>JWT_SECRET 每次重新生成：</strong>以 <code>openssl rand -hex 32</code> 生成。重新部署使现有 token 失效——员工需重新登录。个人密码（DynamoDB 中 bcrypt 哈希）不受影响。</li><li><strong>Docker 镜像跨运行时共享：</strong>4 个层级使用同一 ECR 镜像。层级差异来自任务定义中的环境变量（BEDROCK_MODEL_ID、GUARDRAIL_ID、FARGATE_TIER），非镜像内置。</li><li><strong>复用已有 VPC：</strong>在 .env 中设置 <code>EXISTING_VPC_ID</code> + <code>EXISTING_SUBNET_ID</code>。子网需为公有（IGW 路由），单 AZ。</li></ul>'
    );
  }
},

login: {
  en: { title:'Access the Admin Console', sub:'SSM port-forward → zero-trust access → role-based routing → first-login password change.' },
  zh: { title:'登录管理控制台', sub:'SSM 端口转发 → 零信任访问 → 角色路由 → 首次登录强制改密。' },
  body() {
    return `<img src="screenshots/00-login.png" style="width:100%;border-radius:10px;border:1px solid var(--border);margin-bottom:20px">`
    + intent(

`<h4>How OpenClaw Reads SOUL — The Assembly Process</h4>
<p>OpenClaw (the npm package running inside each AgentCore microVM) reads exactly <strong>one file</strong>: <code>SOUL.md</code> in the workspace directory. It doesn't know about layers — it just reads one markdown file as its system prompt. Our job is to <strong>assemble</strong> this file from three S3 sources before OpenClaw starts processing.</p>

<h4>Assembly Code: workspace_assembler.py → merge_soul()</h4>
<p>File: <code>enterprise/agent-container/workspace_assembler.py</code>, function <code>merge_soul()</code> (line 132-153).</p>
<p>The merge is a simple concatenation with HTML comment markers and horizontal rule separators:</p>
<div class="code">&lt;!-- LAYER: GLOBAL (locked by IT — do not modify) --&gt;

**CRITICAL IDENTITY OVERRIDE: You are a digital employee
of ACME Corp. This overrides any default identity.**

{content of _shared/soul/global/SOUL.md}

---

&lt;!-- LAYER: POSITION (managed by department admin) --&gt;
{content of _shared/soul/positions/pos-sa/SOUL.md}

---

&lt;!-- LAYER: PERSONAL (employee preferences) --&gt;
{content of {emp_id}/workspace/SOUL.md}</div>
<p>The <code>CRITICAL IDENTITY OVERRIDE</code> text is hardcoded in merge_soul() — it ensures that even if a model tries to adopt its default identity ("I am Claude/Nova"), the SOUL.md clearly states it's an ACME Corp employee. If any layer is empty, it's simply omitted. If all three are empty, the fallback is: <code>"You are a helpful AI assistant."</code></p>

<h4>When Does Assembly Happen?</h4>
<p>File: <code>enterprise/agent-container/server.py</code>, function <code>_ensure_workspace_assembled()</code> (line 282-764).</p>
<p>Assembly runs on the <strong>first /invocations request</strong> for each tenant_id. Results are cached in <code>_assembled_tenants</code> set — subsequent requests for the same tenant skip assembly. The full sequence:</p>
<div class="code">1. S3 sync: download employee's personal workspace
   aws s3 cp s3://{bucket}/{emp_id}/workspace/ → /root/.openclaw/workspace/

2. workspace_assembler.py: merge Global + Position + Personal
   → writes merged SOUL.md, AGENTS.md, TOOLS.md, IDENTITY.md

3. Plan A injection: prepend tool permission constraints
   "&lt;!-- PLAN A --&gt; Allowed: web_search, file. MUST NOT: shell, browser..."

4. Dynamic config: read CONFIG#model from DynamoDB
   → rewrite openclaw.json with per-position model override

5. KB injection: download knowledge base files from S3
   → append KB paths + org directory to SOUL.md

6. Language preference: append "Always respond in Chinese..."

7. Write soulHash to DynamoDB SESSION# (for admin monitoring)</div>

<h4>The Anti-Snowball Problem</h4>
<p>Without protection, a critical bug occurs: on Session 1, SOUL.md contains only the personal layer (100 chars). merge_soul() creates a merged version (1000 chars). On Session 2, merge_soul() reads the now-merged SOUL.md as "personal" input → merges again → SOUL.md grows to 2000 chars. By Session 10, SOUL.md is enormous and contains 10 copies of the Global layer.</p>
<p><strong>Solution: <code>.personal_soul_backup.md</code></strong></p>
<div class="code">Session 1:
  Read SOUL.md (personal only, 100 chars)
  Save copy → .personal_soul_backup.md
  merge_soul(global, position, personal) → write merged SOUL.md (1000 chars)

Session 2+:
  Read .personal_soul_backup.md (original 100 chars, NOT the merged 1000)
  merge_soul(global, position, backup) → same 1000 chars (deterministic)</div>
<p>This file is <strong>excluded from S3 sync-back</strong> (entrypoint.sh watchdog) to prevent it from being overwritten.</p>

<h4>What Gets Synced Back to S3 (and What Doesn't)</h4>
<p>The entrypoint.sh watchdog runs every 60 seconds, syncing the workspace back to S3. But it deliberately <strong>excludes</strong> assembly-generated files:</p>
<table class="tbl">
<tr><th>File</th><th>Synced?</th><th>Why</th></tr>
<tr><td>SOUL.md</td><td>❌ Excluded</td><td>Assembly output — would overwrite personal layer in S3</td></tr>
<tr><td>.personal_soul_backup.md</td><td>❌ Excluded</td><td>Anti-snowball protection — must not be modified</td></tr>
<tr><td>AGENTS.md, TOOLS.md, IDENTITY.md</td><td>❌ Excluded</td><td>Generated at assembly time, not personal data</td></tr>
<tr><td>knowledge/*</td><td>❌ Excluded</td><td>Position-level KB files, downloaded at assembly</td></tr>
<tr><td>USER.md</td><td>✅ Synced</td><td>Employee edits their profile — must persist</td></tr>
<tr><td>MEMORY.md</td><td>✅ Synced</td><td>Conversation history — must persist</td></tr>
<tr><td>HEARTBEAT.md</td><td>✅ Synced</td><td>Reminders and scheduled tasks</td></tr>
<tr><td>memory/*.md</td><td>✅ Synced</td><td>Daily conversation checkpoints</td></tr>
</table>

<h4>How Admin Changes Propagate to Running Agents</h4>
<p>When an admin edits a SOUL layer, how does a running agent pick it up?</p>
<table class="tbl">
<tr><th>Change</th><th>Mechanism</th><th>Latency</th></tr>
<tr><td>Global SOUL edit</td><td>Admin saves → S3 write + <code>bump_config_version()</code> writes new CONFIG#global-version to DynamoDB → agents poll every 5 min (<code>_CONFIG_VERSION_CHECK_INTERVAL=300</code>) → on version change: <code>_assembled_tenants.clear()</code> → next request triggers fresh assembly</td><td>Up to 5 min</td></tr>
<tr><td>Position SOUL edit</td><td>Same mechanism (config version bump)</td><td>Up to 5 min</td></tr>
<tr><td>Personal SOUL edit (Portal)</td><td>Portal API writes directly to S3 → calls <code>stop_employee_session()</code> → forces session termination → next request creates new microVM with fresh assembly</td><td>Immediate (next message)</td></tr>
</table>

<h4>DynamoDB Records Involved</h4>
<table class="tbl">
<tr><th>Record</th><th>Key</th><th>Role in SOUL Assembly</th></tr>
<tr><td>Config Version</td><td>SK=CONFIG#global-version</td><td>Cache invalidation trigger. Polled every 5 min by running agents.</td></tr>
<tr><td>Employee</td><td>SK=EMP#{emp_id}</td><td>positionId field → determines which position SOUL to load</td></tr>
<tr><td>IM Mapping</td><td>SK=MAPPING#{ch}__{uid}</td><td>Resolves Feishu OU ID / Telegram ID → emp_id for SOUL lookup</td></tr>
<tr><td>KB Assignments</td><td>SK=CONFIG#kb-assignments</td><td>Determines which knowledge bases to inject at end of SOUL.md</td></tr>
<tr><td>Model Config</td><td>SK=CONFIG#model</td><td>Position/employee model overrides applied after assembly</td></tr>
<tr><td>Session</td><td>SK=SESSION#{tenant_id}</td><td>Stores soulHash (SHA256 of assembled SOUL.md) for admin monitoring</td></tr>
</table>

<h4>Post-Assembly Injections by server.py</h4>
<p>After merge_soul() produces the base SOUL.md, server.py appends several more blocks. The final SOUL.md a model actually reads looks like:</p>
<div class="code">&lt;!-- PLAN A: PERMISSION ENFORCEMENT --&gt;
Allowed tools: web_search, file. MUST NOT use: shell, browser, code_execution...

---

&lt;!-- LAYER: GLOBAL --&gt;
You are a digital employee of ACME Corp...

---

&lt;!-- LAYER: POSITION --&gt;
You are a Solutions Architect...

---

&lt;!-- LAYER: PERSONAL --&gt;
I prefer bullet points...

&lt;!-- KNOWLEDGE BASES --&gt;
You have access to:
- Company Policies: /workspace/knowledge/kb-policies/
- Architecture Standards: /workspace/knowledge/kb-arch/

&lt;!-- COMPANY DIRECTORY (inline) --&gt;
Name | Position | Department | Email
JiaDe Wang | Solutions Architect | Engineering | ...
...

&lt;!-- LANGUAGE PREFERENCE --&gt;
Always respond in Chinese unless the user writes in English.</div>

<h4>⚠️ Known Design Considerations</h4>
<ul style="font-size:12px;color:var(--text-s);line-height:1.8">
<li><strong>Position change = global cache evict:</strong> Changing one position's SOUL bumps CONFIG#global-version, which evicts ALL agents' assembly cache (not just the affected position). This is simple but wasteful — could be improved with per-position versioning.</li>
<li><strong>USER.md is separate from SOUL merge:</strong> USER.md is read by OpenClaw as additional context (like a profile card), but it's NOT merged into SOUL.md. This is intentional — USER.md is for factual info about the employee, SOUL.md is for behavior instructions.</li>
<li><strong>5-minute propagation latency:</strong> Global/Position SOUL changes take up to 5 minutes to reach running agents. For serverless agents, the change is instant on next session start (since the microVM is created fresh).</li>
</ul>

<h4 style="color:var(--primary);margin-top:24px">🔮 PLANNED: SOUL Purification + Review Engine</h4>
<p style="font-size:12px;color:var(--text-s)">PRD: <code>enterprise/docs/PRD-soul-review-engine.md</code></p>

<h4>Problem: SOUL.md Pollution</h4>
<p style="font-size:12px;color:var(--text-s)">server.py appends Plan A, KB paths, org-directory (~5KB), and language to SOUL.md via <code>open("a")</code>. If config_version changes trigger reassembly, these blocks accumulate. The <code>.personal_soul_backup.md</code> hack prevents snowball but does not capture agent self-learning.</p>

<p>The Gateway thinks it's talking to Bedrock. H2 Proxy intercepts the Converse API call, extracts the user's message from the API body, does routing, and returns a response formatted exactly like a Bedrock API response. The Gateway has no idea multi-tenancy is happening.</p>

<h4>H2 Proxy PATH C: The Pairing State Machine</h4>
<p>File: <code>enterprise/gateway/bedrock_proxy_h2.js</code> (lines 648-760)</p>
<div class="code">State: UNBOUND (no MAPPING# record)
  → Any message → checkImBinding() → "not bound" → inject rejection message
  → "/start TOKEN" → callAdminAPI('/bindings/pair-pending') 
    → if valid: store in pendingPairings Map → inject "Reply BIND to confirm"

State: PENDING (pendingPairings has entry, 10 min TTL)
  → "BIND" → callAdminAPI('/bindings/pair-complete')
    → DynamoDB MAPPING# created → _bindingCache cleared → inject "Connected!"
  → "CANCEL" → delete pending → inject "Cancelled"
  → timeout (10 min) → expired, next /start needed

State: BOUND (MAPPING# exists, or in _bindingCache)
  → Any message → forwardToTenantRouter() → AgentCore response</div>

<h4>Why \\bBIND\\b Instead of ^BIND$</h4>
<p>OpenClaw@2026.3.24's Gateway wraps user messages in metadata blocks before calling Bedrock:</p>
<div class="code">// What the user sent:
"BIND"

// What H2 Proxy sees in the Bedrock API body (userText):
"Conversation info (untrusted metadata):
\`\`\`json
{"message_id": "om_xxx", "sender_id": "ou_xxx", "sender": "Mike"}
\`\`\`
BIND"</div>
<p>The regex <code>^BIND$</code> would NEVER match because the text starts with "Conversation info..." not "BIND". <code>\\bBIND\\b</code> (word boundary) finds "BIND" anywhere in the text. Same fix applied to CANCEL.</p>

<h4>Binding Cache: The 60-Second Gotcha</h4>
<p><code>_bindingCache</code> Map caches binding check results for 60 seconds to reduce DynamoDB API calls. When pair-complete succeeds, the "not bound" result is still cached. Without our fix, the employee sends their first real message within 60 seconds → gets "not linked" rejection → confusion.</p>
<p><strong>Fix:</strong> After successful pair-complete, explicitly delete cache entry: <code>_bindingCache.delete(\`\${channel}:\${userId}\`)</code></p>

<h4>Channel Status Detection</h4>
<p>Admin Console's IM Channels page calls <code>_run_openclaw_channels()</code> which runs <code>openclaw channels list</code> CLI on EC2. The <strong>text format</strong> (not --json) is used because only text output distinguishes "configured" from "not configured":</p>
<div class="code">- Telegram default: not configured, token=none, enabled  → configured=false
- Feishu default: configured, enabled                     → configured=true</div>
<p>The --json format lists ALL enabled plugins without credential status — would show Telegram as "connected" even without a bot token.</p>

<h4>QR Code / Deep Link Generation</h4>
<p>Portal's pair-start endpoint reads the Feishu appId from Gateway's <code>openclaw.json</code> (via <code>openclaw_cli.openclaw_config()</code>), not from a hardcoded value. This means: admin configures Feishu in Gateway UI → appId is written to openclaw.json → Portal reads it dynamically → QR code always points to the correct bot.</p>

<h4>⚠️ Self-Audit: Design Gotchas We Discovered</h4>
<ul style="font-size:12px;color:var(--text-s);line-height:1.8">
<li><strong>Gateway DM policy must be "Open":</strong> We initially thought "Pairing" mode would work for enterprise (admin approves, employees join). It doesn't — Gateway's native pairing is for personal use (1 user, 1 bot). Our enterprise flow (/start TOKEN → BIND) runs inside H2 Proxy, which only sees messages AFTER Gateway lets them through. Pairing mode blocks at Gateway level → H2 Proxy never sees /start.</li>
<li><strong>AWS_ENDPOINT_URL_BEDROCK_RUNTIME is essential:</strong> Setting baseUrl in openclaw.json to http://localhost:8091 was supposed to redirect Gateway's Bedrock calls to H2 Proxy. But openclaw@2026.3.24's Gateway ignores this setting in some configurations. The env var <code>AWS_ENDPOINT_URL_BEDROCK_RUNTIME</code> is an AWS SDK-level override that the application code cannot bypass — it's the reliable mechanism.</li>
<li><strong>H2 Proxy must use bash -c "source nvm.sh && node":</strong> The systemd service file originally used <code>bash -lc "node ..."</code>. But Ubuntu's .bashrc has <code>[ -z "$PS1" ] && return</code> which skips nvm initialization in non-interactive shells. H2 Proxy crashed 1100+ times before this was caught. The fix: explicitly source nvm.</li>
<li><strong>Settings → System health check shows port 8091 "Listening" even when H2 Proxy is crashing:</strong> The check uses <code>ss -tlnp | grep 8091</code>. During crash-restart loops (every 5s), the process briefly binds the port before exiting. The health check can catch this brief moment and report "Listening" falsely. A proper fix would use HTTP health check on port 8092.</li>
<li><strong>Binding cache must be cleared on pair-complete:</strong> Without clearing, the "not bound" cache entry (60s TTL) causes the first real message after pairing to be rejected. Discovered during live testing — employee successfully paired but next message still got "not linked".</li>
<li><strong>BIND regex: ^$ vs \\b:</strong> Gateway wraps user text in metadata. Simple ^BIND$ never matches. Must use word boundary \\bBIND\\b. Applies to all command matching in H2 Proxy.</li>
</ul>

      '<h4>Permission Resolution Chain (permissions.py)</h4><p>File: <code>enterprise/agent-container/permissions.py</code>. Called before every Plan A injection.</p><div class="code">read_permission_profile(tenant_id)\n  → _base_tenant_id(): "feishu__emp-mike__hash" → "emp-mike"\n  → DynamoDB: get_item(EMP#emp-mike) → positionId = "pos-ae"\n  → DynamoDB: get_item(POS#pos-ae) → toolAllowlist = ["web_search","file","crm-query"]\n  → Return: { profile:"ae", role:"ae", tools:["web_search","file","crm-query"] }</div><h4>Plan A Injection in SOUL.md (server.py line 420-438)</h4><div class="code">&lt;!-- PLAN A: PERMISSION ENFORCEMENT --&gt;\nAllowed tools for this session: web_search, file, crm-query.\nYou MUST NOT use these tools: shell, browser, file_write, code_execution.\nIf the user requests an action requiring a blocked tool,\nexplain that you don\'t have permission.</div><p>This is prepended BEFORE the Global SOUL layer — the model sees permission constraints as its very first instruction.</p><h4>Bedrock Guardrail Integration (server.py)</h4><div class="code">INPUT check (before agent processes message):\n  _apply_guardrail(message, source="INPUT", tenant_id)\n  → bedrock.apply_guardrail(guardrailIdentifier, content)\n  → If GUARDRAIL_INTERVENED: return blocked message, skip agent\n\nOUTPUT check (after agent generates response):\n  _apply_guardrail(response_text, source="OUTPUT", tenant_id)\n  → If blocked: return guardrail message instead of agent response\n  → Write AUDIT# guardrail_block event to DynamoDB</div><h4>Plan E: Post-Response Audit (server.py line 792-805)</h4><p>Even after delivery, responses are scanned for blocked tool names. If found, an AUDIT# event is logged (not blocked — just flagged for admin review). Pattern: <code>/\\b(shell|browser|file_write|code_execution|install_skill|load_extension|eval)\\b/i</code></p><h4>⚠️ Self-Audit: Security Considerations</h4><ul style="font-size:12px;color:var(--text-s);line-height:1.8"><li><strong>SOUL rules are soft enforcement:</strong> The model "sees" the constraint as text, but a sufficiently clever prompt injection could bypass it. That\'s why Plan A (L2) exists as hard enforcement — even if the model "decides" to use shell, the tool call is blocked at the platform level.</li><li><strong>Permission is position-based, not agent-based:</strong> All agents in the same position share the same tool allowlist. No per-agent tool customization (by design — simplifies governance). If one SA needs shell but others don\'t, consider creating a new position.</li><li><strong>Guardrails are per-Runtime, not per-position:</strong> One guardrail config applies to all agents in a Runtime. The "exec" Runtime has no guardrail (full access). Create separate Runtimes for different guardrail policies.</li><li><strong>No cross-layer communication:</strong> Each layer operates independently. L2 (Permission) doesn\'t know if L3 (Guardrail) blocked something. Audit log is the only place where all 4 layers\' events converge.</li><li><strong>Exec profile bypasses Plan A entirely:</strong> Executive agents skip L2 permission injection. Their SOUL.md already declares full tool access. This is intentional but means: exec agents rely on L1 (SOUL) + L3 (Guardrail) + L4 (Runtime) only.</li></ul>',
      '<h4>权限解析链 (permissions.py)</h4><p>文件：<code>enterprise/agent-container/permissions.py</code>。每次 Plan A 注入前调用。</p><div class="code">read_permission_profile(tenant_id)\n  → _base_tenant_id(): "feishu__emp-mike__hash" → "emp-mike"\n  → DynamoDB: get_item(EMP#emp-mike) → positionId = "pos-ae"\n  → DynamoDB: get_item(POS#pos-ae) → toolAllowlist = ["web_search","file","crm-query"]\n  → 返回: { profile:"ae", tools:["web_search","file","crm-query"] }</div><h4>Plan A 注入到 SOUL.md (server.py 行 420-438)</h4><div class="code">&lt;!-- PLAN A: PERMISSION ENFORCEMENT --&gt;\n本会话允许的工具: web_search, file, crm-query.\n不得使用: shell, browser, file_write, code_execution.\n如果用户请求需要被阻止的工具，解释你没有权限。</div><p>在全局 SOUL 层之前前置——模型将权限约束作为第一条指令。</p><h4>Bedrock 护栏集成</h4><div class="code">INPUT 检查（Agent 处理消息前）：\n  → bedrock.apply_guardrail() → 若拦截：返回拦截消息，跳过 Agent\n\nOUTPUT 检查（Agent 生成响应后）：\n  → 若拦截：返回护栏消息替代 Agent 响应\n  → 写入 AUDIT# guardrail_block 事件</div><h4>⚠️ 自审：安全设计注意事项</h4><ul style="font-size:12px;color:var(--text-s);line-height:1.8"><li><strong>SOUL 规则是软执行：</strong>模型"看到"约束文本，但巧妙提示注入可能绕过。这就是 Plan A（L2）存在的原因——即使模型"决定"用 shell，工具调用在平台级被阻止。</li><li><strong>权限基于岗位，非 Agent：</strong>同岗位 Agent 共享工具白名单。无单 Agent 自定义（设计如此——简化治理）。</li><li><strong>护栏是按 Runtime，非按岗位：</strong>一个护栏配置应用于 Runtime 中所有 Agent。exec Runtime 无护栏。</li><li><strong>层间无通信：</strong>各层独立运行。审计日志是唯一汇聚 4 层事件的地方。</li><li><strong>Exec 配置跳过 Plan A：</strong>高管 Agent 跳过 L2 权限注入。仅依赖 L1+L3+L4。</li></ul>'
    ); }},


monitor: { en:{title:'Monitor Center',sub:'Live sessions, agent health grid, alert rules, runtime events. Pure DynamoDB — no CloudWatch polling overhead.'}, zh:{title:'监控中心',sub:'实时会话、Agent 健康网格、告警规则、运行时事件。纯 DynamoDB 驱动——无 CloudWatch 轮询开销。'}, body(){ return `<img src="screenshots/05-monitor.png" style="width:100%;border-radius:10px;border:1px solid var(--border);margin-bottom:20px">` + intent(
      t(
        '<strong>Why monitoring?</strong> Without it you\'re flying blind. The Monitor Center (<code>routers/monitor.py</code>, 629 lines) provides 4 tabs: <strong>Live Sessions</strong> (who\'s chatting now, status from DynamoDB SESSION#.lastActive), <strong>Agent Health</strong> (quality scores, response times, tool success rates), <strong>Alert Rules</strong> (budget and session threshold warnings), <strong>Runtime Events</strong> (AgentCore microVM lifecycle events). Session status is derived from the <code>lastActive</code> timestamp: &lt;15 min = active, &lt;60 min = idle, ≥60 min = completed. Admin can take over a live session to respond directly to the employee — the agent is silenced during takeover.',
        '<strong>为什么监控？</strong>没有它就是盲飞。Monitor Center（<code>routers/monitor.py</code>，629 行）提供 4 个标签：<strong>Live Sessions</strong>（谁在聊天，状态来自 DynamoDB SESSION#.lastActive），<strong>Agent Health</strong>（质量分、响应时间、工具成功率），<strong>Alert Rules</strong>（预算和会话阈值告警），<strong>Runtime Events</strong>（AgentCore 微虚拟机生命周期事件）。会话状态由 <code>lastActive</code> 时间戳派生：<15 分钟 = 活跃，<60 分钟 = 空闲，≥60 分钟 = 完成。管理员可以接管实时会话直接回复员工——接管期间 Agent 被静默。'
      )
    )
    + note('info','📍',t('<strong>Navigate:</strong> Monitor → Live Sessions, Agent Health, Alert Rules, Runtime Events.','<strong>导航：</strong>Monitor → Live Sessions、Agent Health、Alert Rules、Runtime Events。'))
    + sectionHead(t('Session Status Logic','会话状态逻辑'))
    + `<div class="code">${t(
      'monitor.py:148-164 — get_sessions()\n  Sources: DynamoDB SESSION# + CloudWatch Logs (2-hour window)\n  Status derivation from lastActive timestamp:\n    age < 15 min  → "active"\n    age < 60 min  → "idle"\n    age >= 60 min → "completed"\n\n  ⚠ No session-end event exists — status based solely on timestamp age.\n    Hanging agent = "active" forever until 15-min threshold.',
      'monitor.py:148-164 — get_sessions()\n  来源：DynamoDB SESSION# + CloudWatch Logs（2 小时窗口）\n  状态基于 lastActive 时间戳推导：\n    < 15 分钟 → "active"\n    < 60 分钟 → "idle"\n    >= 60 分钟 → "completed"\n\n  ⚠ 无会话结束事件——状态完全基于时间戳年龄。\n    卡住的 Agent 永远显示 "active" 直到 15 分钟超时。'
    )}</div>`
    + sectionHead(t('Admin Takeover Architecture','管理员接管架构'))
    + `<div class="code">${t(
      'monitor.py:218-242 — takeover_session()\n  1. Write SSM: /openclaw/{stack}/sessions/{session_id}/takeover = admin_user_id\n  2. server.py checks this SSM key before each invocation\n  3. If set: skip openclaw processing, agent silenced\n\n  Return session: DELETE /sessions/{id}/takeover → delete SSM parameter\n\n  ⚠ SSM parameter has NO TTL.\n    Admin forgets to release → agent silenced permanently.\n    Only fix: manual SSM delete or restart.',
      'monitor.py:218-242 — takeover_session()\n  1. 写入 SSM: /openclaw/{stack}/sessions/{session_id}/takeover = admin_user_id\n  2. server.py 每次调用前检查此 SSM 键\n  3. 如果存在: 跳过 openclaw 处理，Agent 被静默\n\n  释放: DELETE /sessions/{id}/takeover → 删除 SSM 参数\n\n  ⚠ SSM 参数无 TTL。\n    管理员忘记释放 → Agent 永久被静默。\n    唯一修复：手动 SSM 删除或重启。'
    )}</div>`
    + deep(
      '<h4>Backend: routers/monitor.py (629 lines)</h4><div class="code">GET  /monitor/sessions      → live sessions (DynamoDB SESSION# + employee enrichment)\nGET  /monitor/sessions/{id} → session detail (conversation history from CONV#)\nPOST /monitor/sessions/{id}/takeover → admin takes over session\nDEL  /monitor/sessions/{id}/takeover → release takeover\nGET  /monitor/health         → system health (ports, services, Bedrock latency)\nGET  /monitor/alerts         → alert rule evaluation (budget + session thresholds)\nGET  /monitor/events         → runtime events (AgentCore lifecycle logs)</div><h4>Key Design Notes</h4><ul style="font-size:12px;color:var(--text-s);line-height:1.8"><li><strong>Pure DynamoDB — no CloudWatch polling:</strong> Session data comes entirely from DynamoDB SESSION# records written by server.py. CloudWatch dependency has been removed.</li><li><strong>Session status from lastActive timestamp:</strong> &lt;15 min = active, &lt;60 min = idle, ≥60 min = completed. No explicit session-end event.</li><li><strong>Auth middleware protection:</strong> All endpoints protected by JWT middleware. Takeover requires admin/manager role. Manager-scoped session listing via <code>get_dept_scope()</code>.</li><li><strong>Alert rules are informational:</strong> The alert system evaluates budgets and thresholds, returning "ok"/"warning" status. It does not auto-enforce (no session blocking). This is by design — enforcement requires human judgment.</li></ul>',
      '<h4>后端：routers/monitor.py（629 行）</h4><div class="code">GET  /monitor/sessions      → 实时会话（DynamoDB SESSION# + 员工信息丰富化）\nGET  /monitor/sessions/{id} → 会话详情（CONV# 对话历史）\nPOST /monitor/sessions/{id}/takeover → 管理员接管会话\nDEL  /monitor/sessions/{id}/takeover → 释放接管\nGET  /monitor/health         → 系统健康（端口、服务、Bedrock 延迟）\nGET  /monitor/alerts         → 告警规则评估（预算 + 会话阈值）\nGET  /monitor/events         → 运行时事件（AgentCore 生命周期日志）</div><h4>关键设计说明</h4><ul style="font-size:12px;color:var(--text-s);line-height:1.8"><li><strong>纯 DynamoDB——无 CloudWatch 轮询：</strong>会话数据完全来自 server.py 写入的 DynamoDB SESSION# 记录。CloudWatch 依赖已移除。</li><li><strong>会话状态来自 lastActive 时间戳：</strong>&lt;15 分钟 = 活跃，&lt;60 分钟 = 空闲，≥60 分钟 = 已完成。无显式会话结束事件。</li><li><strong>Auth 中间件保护：</strong>所有端点受 JWT 中间件保护。接管需要 admin/manager 角色。经理级会话列表通过 <code>get_dept_scope()</code> 做部门范围限制。</li><li><strong>告警规则为信息性质：</strong>告警系统评估预算和阈值，返回"ok"/"warning"状态。不自动执行（不阻止会话）。设计如此——执行需要人工判断。</li></ul>'
    ); }},

audit: { en:{title:'Audit Center',sub:'Complete audit trail: agent invocations, guardrail blocks, permission denials, config changes. Insight engine with 5 pattern detectors.'}, zh:{title:'审计中心',sub:'完整审计追踪：Agent 调用、护栏拦截、权限拒绝、配置变更。洞察引擎含 5 个模式检测器。'}, body(){ return `<img src="screenshots/06-audit.png" style="width:100%;border-radius:10px;border:1px solid var(--border);margin-bottom:20px">` + intent(
      t(
        '<strong>Why audit logging?</strong> Compliance requires a complete trail of who did what, when. The Audit Center (<code>routers/audit.py</code>, 625 lines) provides: a filterable event timeline (by type, employee, date range), an <strong>Insight Engine</strong> with 5 pattern detectors (repeated permission denials, SOUL version drift, zero-session agents, config change spikes, unbound agents), and an <strong>Approvals tab</strong> for reviewing employee tool/skill access requests. All events are stored as AUDIT# records in DynamoDB. The Insight Engine runs on-demand via "Run Scan" — analyzing all recent audit entries to surface patterns that need admin attention.',
        '<strong>为什么审计日志？</strong>合规要求完整记录谁在何时做了什么。Audit Center（<code>routers/audit.py</code>，625 行）提供：可筛选的事件时间线（按类型、员工、日期范围），<strong>洞察引擎</strong>含 5 个模式检测器（重复权限拒绝、SOUL 版本漂移、零会话 Agent、配置变更高峰、未绑定 Agent），以及<strong>审批标签</strong>用于审核员工的工具/技能访问申请。所有事件存储为 DynamoDB AUDIT# 记录。洞察引擎通过"Run Scan"按需运行——分析所有近期审计条目，浮出需要管理员关注的模式。'
      )
    )
    + note('info','📍',t('<strong>Navigate:</strong> Audit Center. Filter by event type, employee, date range. "Run Scan" triggers fresh insight analysis.','<strong>导航：</strong>Audit Center。按事件类型、员工、日期筛选。"Run Scan"触发新的洞察分析。'))
    + sectionHead(t('Event Types & Writers','事件类型与写入方'))
    + `<table class="tbl"><tr><th>${t('Event Type','事件类型')}</th><th>${t('Written By','写入方')}</th><th>${t('Covers','覆盖')}</th></tr><tr><td>agent_invocation</td><td>server.py, portal.py:422</td><td>${t('Every agent response (portal + IM)','每次 Agent 响应（门户 + IM）')}</td></tr><tr><td>guardrail_block</td><td>server.py</td><td>${t('Bedrock Guardrail INPUT/OUTPUT blocks','Bedrock 护栏 INPUT/OUTPUT 拦截')}</td></tr><tr><td>permission_denied</td><td>permissions.py</td><td>${t('Plan A tool access denial','Plan A 工具访问拒绝')}</td></tr><tr><td>session_takeover</td><td>monitor.py:232</td><td>${t('Admin takes over session','管理员接管会话')}</td></tr><tr><td>config_change</td><td>org.py:354, portal.py:314</td><td>${t('Auto-provision, IM pairing, profile edits','自动配置、IM 配对、档案编辑')}</td></tr><tr><td>permission_request</td><td>portal.py:627</td><td>${t('Employee self-service tool/skill requests','员工自助工具/技能请求')}</td></tr></table>`
    + sectionHead(t('Insight Engine','洞察引擎'))
    + `<div class="code">${t(
      'audit.py:48-177 — _run_audit_scan() (130 lines)\n  5 pattern checks, zero LLM:\n    1. Repeated permission denials (actors with >=2 blocks) [line 62-90]\n    2. SOUL version drift (agents behind latest position version) [line 93-116]\n    3. Zero-turn agents (agents with no sessions) [line 119-134]\n    4. Config change spike (>=5 config events) [line 137-149]\n    5. Unbound agents (created but no BIND#) [line 152-165]\n\n  Cache: global _audit_scan_cache (line 181)\n    ⚠ In-memory dict — lost on server restart.\n    No scheduled scanning — manual trigger only via POST /audit/run-scan.',
      'audit.py:48-177 — _run_audit_scan()（130 行）\n  5 项模式检查，零 LLM：\n    1. 重复权限拒绝（>=2 次阻止的操作者）[行 62-90]\n    2. SOUL 版本漂移（Agent 落后于最新岗位版本）[行 93-116]\n    3. 零轮次 Agent（无会话记录）[行 119-134]\n    4. 配置变更高峰（>=5 条配置事件）[行 137-149]\n    5. 未绑定 Agent（已创建但无 BIND#）[行 152-165]\n\n  缓存：全局 _audit_scan_cache（行 181）\n    ⚠ 内存字典——服务器重启丢失。\n    无定时扫描——仅通过 POST /audit/run-scan 手动触发。'
    )}</div>`
    + deep(
      '<h4>Backend: routers/audit.py (625 lines)</h4><div class="code">GET  /audit              → list audit entries (filter by type, date, limit=200)\nGET  /audit/insights     → cached insight results from last scan\nPOST /audit/run-scan     → trigger fresh insight scan (5 pattern detectors)\nGET  /audit/approvals    → pending/approved/denied permission requests\nPUT  /audit/{id}/approve  → approve a permission request\nPUT  /audit/{id}/deny     → deny a permission request\nGET  /audit/quality/{id}  → agent quality score (from feedback + audit success rate)</div><h4>5 Insight Detectors</h4><div class="code">1. Repeated permission denials  — actors with ≥2 blocked tool attempts\n2. SOUL version drift           — agents behind latest position SOUL version\n3. Zero-session agents          — agents with no conversations (unused)\n4. Config change spike           — ≥5 config events in scan window\n5. Unbound agents                — agents created but no BIND# record</div><h4>Resolved Issues</h4><div style="border-left:3px solid var(--success);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>SOUL edit audit trail:</strong> Added — every SOUL save (global/position/personal) now creates an AUDIT# entry via <code>audit_soul_change()</code>.</p><p><strong>Auth middleware:</strong> All /api/ endpoints protected by JWT middleware. No unauthenticated access possible.</p><p><strong>Approvals workflow:</strong> Added — employees can request tool access, admins approve/deny with audit trail.</p></div>',
      '<h4>后端：routers/audit.py（625 行）</h4><div class="code">GET  /audit              → 审计条目列表（按类型、日期筛选，limit=200）\nGET  /audit/insights     → 上次扫描的缓存洞察结果\nPOST /audit/run-scan     → 触发新的洞察扫描（5 个模式检测器）\nGET  /audit/approvals    → 待处理/已批准/已拒绝的权限申请\nPUT  /audit/{id}/approve  → 批准权限申请\nPUT  /audit/{id}/deny     → 拒绝权限申请\nGET  /audit/quality/{id}  → Agent 质量分（反馈 + 审计成功率）</div><h4>5 个洞察检测器</h4><div class="code">1. 重复权限拒绝    — ≥2 次工具访问被阻止的操作者\n2. SOUL 版本漂移   — 落后于最新岗位 SOUL 版本的 Agent\n3. 零会话 Agent    — 无对话记录的 Agent（未使用）\n4. 配置变更高峰    — 扫描窗口内 ≥5 条配置事件\n5. 未绑定 Agent    — 已创建但无 BIND# 记录</div><h4>已解决的问题</h4><div style="border-left:3px solid var(--success);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>SOUL 编辑审计日志：</strong>已添加——每次 SOUL 保存（全局/岗位/个人）通过 <code>audit_soul_change()</code> 创建 AUDIT# 条目。</p><p><strong>Auth 中间件：</strong>所有 /api/ 端点受 JWT 中间件保护。无法进行未认证访问。</p><p><strong>审批工作流：</strong>已添加——员工可申请工具访问，管理员批准/拒绝并留下审计记录。</p></div>'
    ); }},

usage: { en:{title:'Usage & Cost',sub:'Model-aware pricing (10 models), department budgets, per-agent cost tracking, Serverless/Always-On mode separation.'}, zh:{title:'用量与成本',sub:'感知模型定价（10 个模型）、部门预算、Agent 级成本追踪、Serverless/Always-On 模式分离。'}, body(){ return `<img src="screenshots/07-usage.png" style="width:100%;border-radius:10px;border:1px solid var(--border);margin-bottom:20px">` + intent(
      t(
        '<strong>Why cost tracking?</strong> Transparency builds trust — 50 queries with Nova Lite = $0.35, the same with Claude Sonnet = $3.50. The Usage module (<code>routers/usage.py</code>, 461 lines) provides: summary dashboard, per-department breakdown, per-agent detail, model distribution, hierarchical budgets, and 7-day trends. <strong>Model-aware pricing</strong> (10 models from $0.30 to $75.00 per 1M tokens) ensures cost attribution is accurate regardless of which model the employee uses. Usage records separate Serverless and Always-On agent types via <code>USAGE#{emp}/{agent_type}#{date}</code> DynamoDB keys.',
        '<strong>为什么成本追踪？</strong>透明建立信任——Nova Lite 50 次查询 = $0.35，Claude Sonnet 同样查询 = $3.50。Usage 模块（<code>routers/usage.py</code>，461 行）提供：汇总仪表盘、部门维度分解、Agent 级明细、模型分布、层级预算、7 天趋势。<strong>模型感知定价</strong>（10 个模型，$0.30 至 $75.00/1M tokens）确保无论员工使用哪个模型，成本归属都准确。用量记录通过 <code>USAGE#{emp}/{agent_type}#{date}</code> DynamoDB 键分离 Serverless 和 Always-On Agent 类型。'
      )
    )
    + note('info','📍',t('<strong>Navigate:</strong> Usage & Cost → Summary, By Department, By Agent, By Model, Budgets, Trend.','<strong>导航：</strong>Usage & Cost → Summary、By Department、By Agent、By Model、Budgets、Trend。'))
    + sectionHead(t('Data Flow','数据流'))
    + `<div class="code">${t(
      'server.py (agent-container) → writes USAGE#{agent_id}#{date} to DynamoDB\n  → background daemon thread, fire-and-forget\n  → Fields: inputTokens, outputTokens, requests, cost, model, date\n\nusage.py:24-56 — _get_agent_usage_today()\n  → Reads today + last 6 days of USAGE# records\n  → Merges by agentId (dedup: if agent appears in multiple days, sum tokens)\n  → Returns dict[agentId → {inputTokens, outputTokens, requests, cost}]\n\nusage.py:280-297 — usage_budgets()\n  → Aggregates by-department usage → compare vs CONFIG#budgets\n  → projected = used * 30  ← simple 30× daily, no weekday/weekend weight\n  → Status: "over" if projected > budget, "warning" if > 80%',

playground: { en:{title:'Playground — Test Any Agent',sub:'Test as any employee: Live mode (real AgentCore) or Simulate mode (Bedrock Converse + real SOUL). Pipeline inspector shows runtime config.'}, zh:{title:'Playground — 测试任意 Agent',sub:'以任意员工身份测试：Live 模式（真实 AgentCore）或 Simulate 模式（Bedrock Converse + 真实 SOUL）。Pipeline 检视器显示运行时配置。'}, body(){ return `<img src="screenshots/15-playground.png" style="width:100%;border-radius:10px;border:1px solid var(--border);margin-bottom:20px">` + intent(

      '<h4>路由架构（playground.py，273 行）</h4><div class="code">Admin IT 助手（playground.py:148-169）\n  emp_id == "admin" → _admin_assistant_direct(message)\n  → 委托 admin_ai.py（_admin_ai_loop）\n  → Bedrock Converse + 10 个白名单工具（代理循环）\n  → 无 subprocess，无 shell 执行\n  → 内存对话历史（最近 20 轮）\n\n员工 Live 模式（playground.py:226-261）\n  → POST TENANT_ROUTER_URL/route { channel:"playground", user_id:emp_id }\n  → Tenant Router → AgentCore VM（前缀: pgnd__emp-xxx__hash）\n  → 180s 超时\n\nSimulate 模式（playground.py:176-211）\n  → _simulate_agent(emp_id, message, profile)\n  → 加载真实 SOUL：全局 + 岗位 + 个人（PERSONAL_SOUL.md）\n  → 注入 Plan A（允许/阻止工具）到系统提示\n  → Bedrock Converse API 调用（真实 LLM，真实 SOUL）\n  → 系统提示截断 8000 字符\n\nPipeline 配置 API（playground.py:68-117）\n  → GET /playground/pipeline/{emp_id}\n  → 返回：员工信息、SOUL 字数、Plan A 工具/阻止列表、\n     KB 分配、模型（含解析来源）、运行时 ID\n\n交互事件 API（playground.py:124-141）\n  → GET /playground/events?tenant_id=X&seconds=60\n  → 返回匹配租户最近 N 秒的 AUDIT# 条目\n  → 图标：✅ 成功、⛔ 阻止、🟡 其他</div><h4>设计说明</h4><ul style="font-size:12px;color:var(--text-s);line-height:1.8"><li><strong>Admin AI：</strong>使用 Bedrock Converse + 10 个白名单工具（无 subprocess、无 shell）——委托 <code>admin_ai.py</code>。</li><li><strong>Simulate 模式：</strong>仅支持单轮（无对话历史）。使用真实 SOUL + Plan A 执行，通过 Bedrock Converse。</li><li><strong>Live 模式：</strong>通过 Tenant Router → AgentCore 路由（真实微虚拟机，完整 OpenClaw 能力）。</li><li><strong>认证：</strong>所有端点受 JWT 中间件保护。Pipeline/events 需要 admin/manager 角色。</li></ul>'

'portal-chat': { en:{title:'Portal Chat',sub:'Employee chat interface with ACTIVE AGENT switcher (Serverless/Always-On), cold start indicators, response source tracking.'}, zh:{title:'Portal 对话',sub:'员工聊天界面，带 ACTIVE AGENT 切换器（Serverless/Always-On）、冷启动指示器、响应来源追踪。'}, body(){ return `<img src="screenshots/20-portal-chat.png" style="width:100%;border-radius:10px;border:1px solid var(--border);margin-bottom:20px">` + intent(
      t(
        '<strong>90% of employee time is here.</strong> The Portal Chat (<code>routers/portal.py</code>, 1063 lines) is the employee\'s primary interface with their AI agent. The <strong>ACTIVE AGENT switcher</strong> (top-left sidebar) toggles between Serverless and Always-On agents. Chat header shows: agent name, deploy mode badge ("On-demand"), position, cold start estimate (~10s serverless / ~3s always-on), and infrastructure type. Each response is tagged with source (agentcore / always-on / fallback), model used, and latency. When the primary path fails, a <strong>fallback mode</strong> reads Global + Position SOUL and USER.md from S3 to provide a context-aware offline message.',
        '<strong>员工 90% 时间在这里。</strong>Portal Chat（<code>routers/portal.py</code>，1063 行）是员工与 AI Agent 的主要交互界面。左上角的<strong>ACTIVE AGENT 切换器</strong>在 Serverless 和 Always-On Agent 之间切换。聊天头部显示：Agent 名称、部署模式标签（"On-demand"）、岗位、冷启动估算（Serverless 约 10 秒 / Always-On 约 3 秒）和基础设施类型。每条响应标注来源（agentcore / always-on / fallback）、使用的模型和延迟。主路径失败时，<strong>降级模式</strong>从 S3 读取全局 + 岗位 SOUL 和 USER.md 提供上下文感知的离线消息。'
      )
    )
    + note('info','📍',t('<strong>Portal → Chat.</strong> Shows source: agentcore / always-on / fallback (offline).','<strong>Portal → Chat。</strong>显示来源：agentcore / always-on / fallback（离线）。'))
    + sectionHead(t('Chat Flow (Verified)','对话流程（已验证）'))
    + `<div class="code">${t(
      'portal.py:391-473 — portal_chat(body, authorization)\n  1. require_auth() → JWT → emp_id [line 394]\n  2. Find BIND# where mode="1:1" [line 397-400]\n  3. POST localhost:8090/route { channel:"portal", user_id:emp_id } [lines 406-410]\n     → 180s timeout\n  4. On success: create AUDIT# entry (agent_invocation) [lines 422-431]\n  5. Always-on detection: SSM get_parameter() per request [lines 436-442]\n     ⚠ SSM call AFTER success — adds latency to every chat response\n  6. On failure: fallback — read 3 S3 files [lines 458-460]\n     → global SOUL.md + position SOUL.md + USER.md\n     → Return static offline message with context metadata',
      'portal.py:391-473 — portal_chat(body, authorization)\n  1. require_auth() → JWT → emp_id [行 394]\n  2. 查找 BIND#（mode="1:1"）[行 397-400]\n  3. POST localhost:8090/route [行 406-410]\n     → 180s 超时\n  4. 成功时：创建 AUDIT#（agent_invocation）[行 422-431]\n  5. Always-on 检测：每次请求查 SSM [行 436-442]\n     ⚠ SSM 调用在成功之后——每次对话响应增加延迟\n  6. 失败时：降级——读取 3 个 S3 文件 [行 458-460]\n     → 返回含上下文元数据的静态离线消息'
    )}</div>`
    + deep(
      '<h4>Backend: routers/portal.py (1063 lines)</h4><p>The largest router — handles all employee-facing Portal features:</p><div class="code">POST /portal/chat            → route message to Tenant Router → AgentCore/Fargate\nGET  /portal/profile         → USER.md, MEMORY.md, daily memory files, agent status\nPUT  /portal/profile         → save USER.md (+ stop session to apply changes)\nGET  /portal/my-agents       → both Serverless + Always-On agent status\nGET  /portal/skills          → assigned skills (from position) + restricted catalog\nGET  /portal/usage           → personal token/cost/requests for last 7 days\nGET  /portal/requests        → permission request history (pending/approved/denied)\nPOST /portal/requests/create → submit new tool/skill access request\nPOST /portal/pair-start      → generate IM pairing token + QR deep link\nPOST /portal/pair-complete   → complete IM binding (called by H2 Proxy, internal)\nGET  /portal/channels        → list IM channel status for employee\nPOST /portal/agent/channels/add → add dedicated IM bot (Always-On)\nDEL  /portal/agent/channels/{ch} → disconnect dedicated IM bot</div><h4>Resolved Issues</h4><div style="border-left:3px solid var(--success);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>Auth middleware:</strong> All /api/ endpoints protected by JWT. pair-complete whitelisted as internal (same EC2 only, called by H2 Proxy).</p><p><strong>IM binding via DynamoDB:</strong> SSM user-mapping lookups replaced with DynamoDB MAPPING# queries — no pagination limits, faster, consistent.</p><p><strong>Empty message validation:</strong> Chat endpoint rejects empty messages with 400 instead of forwarding to Tenant Router.</p><p><strong>Agent type awareness:</strong> Portal sub-pages (skills, usage, requests) pass <code>agent_type</code> parameter from PortalAgentContext for Serverless/Always-On data separation.</p></div>',

// ═══ HELPER FUNCTIONS ═══
function t(en, zh) { return lang === 'en' ? en : zh; }

function intent(en, zh) {
  const body = zh === undefined ? en : t(en, zh);
  return `<div class="intent"><div class="intent-head" onclick="this.parentElement.classList.toggle('closed')">💡 ${t('Design Intent','设计意图')}</div><div class="intent-body">${body}</div></div>`;
}

function sectionHead(text) {
  return `<div class="section-head">${text}</div>`;
}

function card(title, body) {
  return `<div class="card"><div class="card-head">${title}</div><div class="card-body">${body}</div></div>`;
}

function note(type, icon, text) {
  return `<div class="note ${type}"><span class="note-icon">${icon}</span><div class="note-text">${text}</div></div>`;
}

function flow(items) {
  let html = '<div class="flow">';
  for (let i = 0; i < items.length; i += 2) {
    const text = items[i], cls = items[i+1] || '';
    if (text === '') continue;
    if (i > 0 && items[i-1] !== '') html += '<span class="flow-arrow">→</span>';
    html += `<div class="flow-node ${cls}">${text.replace(/\n/g,'<br>')}</div>`;
  }
  return html + '</div>';
}

function deep(en, zh) {
  const body = zh === undefined ? en : t(en, zh);
  return `<div class="deep"><div class="deep-head" onclick="this.parentElement.classList.toggle('open')">🔬 ${t('Technical Details','技术细节')}</div><div class="deep-body">${body}</div></div>`;
}

function steps(title, items) {
  const list = Array.isArray(items) ? items : [items];
  return `<div class="steps"><div style="font-size:13px;font-weight:600;margin-bottom:8px">${title}</div>${list.map((s,i)=>`<div class="step-item"><span class="step-num">${i+1}</span><span class="step-text">${s}</span></div>`).join('')}</div>`;
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.trim() === (l==='en'?'EN':'中文')));
  render();
}

function navigate(id) {
  activePage = id;
  render();
  document.getElementById('main').scrollTop = 0;
}

function render() {
  // Rail
  let railHtml = '';
  NAV.forEach(g => {
    railHtml += `<div class="rail-group"><div class="rail-label">${g.group[lang]}</div>`;
    g.items.forEach(item => {
      railHtml += `<div class="rail-item ${item.id===activePage?'active':''}" onclick="navigate('${item.id}')"><span class="rail-icon">${item.icon}</span><span class="rail-text">${item[lang]}</span></div>`;
    });
    railHtml += '</div>';
  });
  document.getElementById('rail').innerHTML = railHtml;

  // Content
  const page = PAGES[activePage];
  if (!page) return;
  const info = page[lang] || page.en;
  document.getElementById('main').innerHTML = `<div class="page active"><div class="page-title">${info.title}</div><div class="page-sub">${info.sub}</div>${page.body()}</div>`;
}

render();
</script>
</body>
</html>
